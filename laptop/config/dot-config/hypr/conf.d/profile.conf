general {
    gaps_in = 2
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(9911aaee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_inactive = false
    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = no
}

misc {
    font_family = Terminess Nerd Font
}

input:touchpad {
    disable_while_typing = false
    natural_scroll = true
}

# Toggle touchpad
bind = $mainMod, F2, exec, ~/.local/bin/togglepad

