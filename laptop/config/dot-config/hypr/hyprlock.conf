# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/hyprlock.png
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    
}

# ANIMATIONS
animations {
	enabled = false
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 22
    font_family = Terminess Nerd Font
    position = 0, 420
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = Terminess Nerd Font
    position = 0, 350
    halign = center
    valign = center
}

# USER-NAME
shape {
	monitor =
	size = 350, 40
	rounding = 20
	border_size = 2
    border_color = rgba(120, 90, 90, 1.0)
    color = rgba(40, 40, 40, 1)

    position = 0, 0
    halign = center
    valign = center
}
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 22
    font_family = Terminess Nerd Font
    position = 0, 0
    halign = center
    valign = center
    shadow_passes = 2
}

# INPUT FIELD
input-field {
    monitor =
    size = 350, 40
    rounding = 20
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(120, 90, 90, 1.0)
    inner_color = rgba(40, 40, 40, 1.0)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Terminess Nerd Font
    placeholder_text = <i><span foreground="##ffffffff">PASSWORD</span></i>
    hide_input = false
    position = 0, -70
    halign = center
    valign = center
}
