"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$username@$hostname $directory$git_branch$git_status$cmd_duration$status$character"

[git_status]
style = "220"

[git_branch]
style = "154"

[directory]
style = "12"
truncation_length = 1
fish_style_pwd_dir_length = 1

[character]
success_symbol = "[❯](10)"
error_symbol = "[❯](196)"

[username]
show_always = true
format = "[$user]($style)"
style_user = "bright-green"
style_root = "221"

[hostname]
ssh_only = false
format = "[$hostname]($style)[$ssh_symbol](bold blue)"
style = "171"
ssh_symbol = ' 󰖟 '

[cmd_duration]
min_time = 500
format = "⏱ [$duration]($style) "
style = "dimmed white"

[status]
disabled = false
format = "[$status]($style) "
style = "bold red"
symbol = ""
success_symbol = ""
map_symbol = true

